version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - "./frontend:/home/forum/frontend:delegated"
      - "/home/forum/frontend/node_modules/"

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    env_file:
      - ./backend/.env
    volumes:
      - "./backend:/home/forum/backend"
      - "/home/forum/backend/node_modules"